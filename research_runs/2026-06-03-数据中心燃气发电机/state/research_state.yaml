core_hypotheses:
  - "AI data center power demand is pushing some operators toward onsite or behind-the-meter gas generation because grid interconnection and utility capacity can lag data center build schedules."
  - "The strongest beneficiaries may be global gas turbine and engine OEMs plus electrical balance-of-plant suppliers, not only China-listed generator concept names."
  - "Gas generation is likely a bridge or hybrid solution constrained by permitting, gas supply, emissions, water, and public-policy risk."

claims:
  confirmed_facts:
    - "Wartsila disclosed a 412MW U.S. hyperscale data-center gas-engine order."
    - "Mitsubishi Power disclosed gas turbine allocation for 1,150MW onsite data-center power at Cheyenne Power Hub."
    - "GE Vernova and Chevron have a data-center-focused natural-gas power collaboration target."
  reasonable_inferences: []
  market_narratives:
    - "AI data-center electricity pressure has increased investor attention on gas power and generator companies."
  unverified_assumptions:
    - "China-listed candidates will obtain material AI data-center gas-generation revenue."
  weak_or_rumor_evidence: []

open_questions:
  - "Which data center operators have announced onsite gas generation, gas turbine procurement, or gas-fired power projects?"
  - "Is the bottleneck gas turbine capacity, engine capacity, interconnection, permitting, gas supply, or emissions compliance?"
  - "Which listed companies have material revenue exposure rather than thematic adjacency?"
  - "How much of the theme has already been priced into GEV, CAT, CMI, Siemens Energy, MHI, and China/HK candidates?"
  - "What evidence would disconfirm onsite gas generation as an AI data center bottleneck opportunity?"

