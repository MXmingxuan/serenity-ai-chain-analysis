core_hypotheses:
  - "AI 数据中心扩张会带动供电、配电、备电和电能质量设备需求。"
  - "客户认证、交付周期、海外准入和高密度供电方案形成阶段性瓶颈。"
  - "真正受益公司需要具备数据中心客户、订单、产品和利润兑现证据。"
  - "部分标的已经被市场明显定价，需要控制追高风险。"

claims:
  confirmed_facts:
    - "IEA、CBRE 和国家数据局均提供数据中心电力需求或算电协同证据。"
    - "金盘科技、明阳电气、科士达、科华数据存在公开数据中心产品或业务披露。"
    - "Tushare 快照显示多只候选股票过去 12 个月涨幅较大。"
  reasonable_inferences:
    - "数据中心电力设备是 AI capex 的二阶/三阶传导机会。"
    - "数据中心专用 UPS/HVDC/电力模块/变压器/开关柜比泛电网设备更直接受益。"
    - "当前更适合建立跟踪清单，而不是整篮子追高。"
  market_narratives:
    - "所有电力设备公司都受益 AI。"
    - "变压器必然长期硬短缺。"
    - "海外 AI 电力缺口会全部由中国公司填补。"
  unverified_assumptions:
    - "A 类公司 2026-2027 年数据中心收入占比将快速提升。"
    - "部分公司具备长约、预付款、涨价或锁产能证据。"
    - "海外订单毛利率显著高于国内订单。"
  weak_or_rumor_evidence:
    - "社媒和部分卖方对 AI 电力设备的泛主题映射。"

open_questions:
  - "金盘科技、明阳电气、科士达、科华数据、思源电气的数据中心收入占比是多少？"
  - "是否存在长约、预付款、客户锁产能、产能售罄或明确涨价？"
  - "海外订单的认证、关税和交付风险如何？"
  - "高估值标的能否用 2026-2027 年利润兑现？"

