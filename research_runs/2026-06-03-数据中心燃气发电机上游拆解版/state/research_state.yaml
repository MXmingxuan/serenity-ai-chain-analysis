  - "AI data center power demand creates real but conditional demand for onsite or bridge gas power."
  - "The more interesting upstream bottleneck may sit in hot gas path parts, superalloys, coatings, precision casting and aftermarket service."
  - "China-listed component names require evidence gates because direct data-center gas-turbine order transmission is not yet verified."

