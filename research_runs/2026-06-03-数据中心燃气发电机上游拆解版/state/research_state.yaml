    - "Howmet and Oerlikon disclose industrial gas turbine hot-section component/coating capabilities."
  reasonable_inferences:
    - "If data-center gas-turbine orders grow, hot-section parts and superalloy demand may rise."
  market_narratives:
    - "AI data-center electricity pressure has increased investor attention on gas power and upstream component companies."
  unverified_assumptions:
    - "China-listed hot-section and superalloy companies will obtain material data-center gas-turbine order exposure."
  weak_or_rumor_evidence: []

open_questions:
